<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PubliADS</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="cadastro">
    <div class="login">
        <div class="login__card">
            <header class="login__head">
                <div class="login__mark">
                    <i class="ph ph-user-plus"></i>
                </div>
                <h1 class="login__title">Crie sua conta</h1>
                <p class="login__sub" style="margin-top: 8px;">Preencha os dados abaixo para começar a anunciar</p>
            </header>

            <form id="registerForm" class="form">
                <div class="field">
                    <label class="label">Nome Completo</label>
                    <input type="text" name="nome" class="input" placeholder="Nome completo" minlength="3" maxlength="80" required>
                </div>

                <div class="field">
                    <label class="label">Usuário ou E-mail</label>
                    <input type="text" name="user" class="input" placeholder="ex: lucas@email.com" minlength="4" maxlength="50" required>
                </div>

                <div class="field">
                    <label class="label">Senha</label>
                    <input type="password" name="pass" class="input" placeholder="Crie uma senha" minlength="6" maxlength="20" required>
                </div>

                <div class="field">
                    <label class="label">Confirmar Senha</label>
                    <input type="password" name="confirmPass" class="input" placeholder="Repita a senha" minlength="6" maxlength="20" required>
                </div>

                <div id="registerMsg" class="msg" style="display: none;"></div>

                <button type="submit" class="btn btn--primary">
                    Finalizar Cadastro
                </button>
            </form>

            <div class="login__hint">
                Já é cadastrado? <a href="login.html" style="color: var(--accent2); font-weight: 600;">Voltar ao Login</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
