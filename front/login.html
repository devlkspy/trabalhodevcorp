<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PubliADS</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body data-page="login">
    <div class="login">
        <div class="login__card">
            <header class="login__head">
                <h1 class="login__title">PubliADS</h1>
                <p class="login__sub" style="margin-top: 8px;">Gerencie suas campanhas de anúncios</p>
            </header>

            <form id="loginForm" class="form">
                <div class="field">
                    <label class="label">Usuário ou E-mail</label>
                    <input type="text" name="user" class="input" placeholder="Login/E-mail" required>
                </div>

                <div class="field">
                    <label class="label">Senha</label>
                    <input type="password" name="pass" class="input" placeholder="••••••••••••••" required>
                </div>

                <div id="loginMsg" class="msg" style="display: none;"></div>

                <button type="submit" class="btn btn--primary">
                    Acessar Conta <i class="ph ph-sign-in"></i>
                </button>
            </form>

            <div class="login__hint">
                Não tem conta? <a href="cadastro" style="color: var(--accent2); font-weight: 600;">Cadastre-se</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
